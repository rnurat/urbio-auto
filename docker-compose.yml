name: "urbio_auto"

services:
    app:
        build:
            context: .
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./:/app
            - auto_node_modules:/app/node_modules
        environment:
            APP_ENV: ${APP_ENV:-local}
            HOSTNAME: 0.0.0.0
            PORT: 3000
            NEXT_TELEMETRY_DISABLED: 1
        ports:
            - "${DOCKER_PORT_AUTO:-3000}:3000"
        command:
            - /bin/sh
            - -c
            - |
                npm ci

                if [ "$$APP_ENV" = "production" ]; then
                  npm run build
                  exec npm run start -- --hostname 0.0.0.0 --port 3000
                fi

                exec npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
    auto_node_modules:
